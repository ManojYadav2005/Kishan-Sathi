<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Kishan Sathi</title>
  <meta name="description" content="Set a new password for your Kishan Sathi account." />
  <link rel="stylesheet" href="style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      min-height: 100vh;
      background: linear-gradient(160deg, #041A11 0%, #0B3D2E 35%, #145A3C 65%, #1A7A52 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-x: hidden;
    }
    
    /* Animated background orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 400px; height: 400px;
      top: -100px; right: -100px;
      background: radial-gradient(circle, rgba(245,197,66,.09) 0%, transparent 70%);
      animation: float 8s ease-in-out infinite;
    }
    body::after {
      width: 300px; height: 300px;
      bottom: -80px; left: -80px;
      background: radial-gradient(circle, rgba(62,217,141,.08) 0%, transparent 70%);
      animation: float 10s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }

    .lang-switch {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 28px;
    }
    .lang-btn {
      padding: 8px 22px;
      border-radius: var(--radius-full);
      border: 2px solid var(--green-200);
      background: var(--green-50);
      color: var(--green-700);
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font-body);
    }
    .lang-btn:hover { border-color: var(--green-400); background: var(--green-100); }
    .lang-btn.active {
      background: linear-gradient(135deg, var(--green-700), var(--green-600));
      color: var(--white);
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(26,122,82,.3);
    }

    .card {
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-2xl);
      box-shadow: 0 30px 70px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,.1);
      padding: 52px 44px;
      width: 100%;
      max-width: 460px;
      animation: slideUp .5s cubic-bezier(.34,1.56,.64,1);
      position: relative;
      z-index: 1;
    }
    @media(max-width:480px) {
      .card { padding: 36px 24px; border-radius: var(--radius-xl); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .brand { text-align: center; margin-bottom: 32px; }
    .brand .icon { font-size: 3rem; display: block; margin-bottom: 10px; filter: drop-shadow(0 4px 8px rgba(0,0,0,.1)); }
    .brand h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--green-800);
      margin-bottom: 8px;
      font-family: var(--font-display);
      letter-spacing: -0.02em;
    }
    .brand p { font-size: 0.9rem; color: var(--neutral-500); line-height: 1.5; }

    .field { margin-bottom: 22px; }
    .field label { display: block; font-weight: 600; font-size: 0.88rem; color: var(--neutral-700); margin-bottom: 6px; }
    .field input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--neutral-200);
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      font-family: var(--font-body);
      outline: none;
      color: var(--neutral-800);
      background: var(--neutral-50);
      transition: var(--transition);
    }
    .field input:focus {
      border-color: var(--green-500);
      box-shadow: 0 0 0 4px rgba(34,167,106,.1);
      background: var(--white);
    }
    .field input::placeholder { color: var(--neutral-400); }
    
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 48px; }
    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--neutral-400);
      padding: 0;
      transition: var(--transition-fast);
    }
    .eye-btn:hover { color: var(--neutral-600); }

    .strength-bar { height: 5px; background: var(--neutral-200); border-radius: var(--radius-full); margin-top: 7px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: var(--radius-full); transition: var(--transition); width: 0; }
    .strength-text { font-size: 0.74rem; font-weight: 600; color: var(--neutral-400); margin-top: 4px; display: inline-block; }

    .rules {
      background: var(--neutral-50);
      border: 1.5px solid var(--neutral-200);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      margin-bottom: 24px;
      font-size: 0.82rem;
      color: var(--neutral-500);
      line-height: 1.5;
    }
    .rules strong { color: var(--neutral-700); font-weight: 700; margin-bottom: 4px; display: block; }
    .rules ul { padding-left: 18px; }
    .rules li { margin-bottom: 3px; transition: var(--transition-fast); }
    .rule-ok { color: var(--green-600) !important; font-weight: 600; }

    .alert {
      padding: 13px 18px;
      border-radius: var(--radius-md);
      font-size: 0.88rem;
      margin-bottom: 18px;
      display: none;
      font-weight: 500;
      line-height: 1.5;
      animation: fadeInUp .2s ease;
    }
    .alert-error   { background: #FEF2F2; border: 1.5px solid #FCA5A5; color: #B91C1C; }
    .alert-success { background: var(--green-50); border: 1.5px solid var(--green-300); color: var(--green-800); }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--green-700), var(--green-500));
      color: var(--white);
      border: none;
      border-radius: var(--radius-md);
      font-size: 1rem;
      font-weight: 700;
      font-family: var(--font-body);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 52px;
      box-shadow: 0 4px 16px rgba(26,122,82,.3);
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 50%);
      opacity: 0;
      transition: opacity .3s;
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(26,122,82,.4);
    }
    .btn:hover::after { opacity: 1; }
    .btn:disabled { opacity: .65; cursor: not-allowed; transform: none; }
    
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,.35);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.loading .btn-label { display: none; }
    .btn.loading .spinner   { display: block; }

    .invalid-state {
      display: none;
      text-align: center;
      padding: 12px 0;
    }
    .invalid-state .icon { font-size: 3.5rem; margin-bottom: 16px; display: block; filter: drop-shadow(0 4px 8px rgba(0,0,0,.1)); }
    .invalid-state h2 { color: var(--red-500); margin-bottom: 10px; font-family: var(--font-display); font-size: 1.4rem; }
    .invalid-state p { color: var(--neutral-500); font-size: 0.92rem; line-height: 1.6; margin-bottom: 24px; }
    .invalid-state a {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--green-700), var(--green-500));
      color: var(--white); border-radius: var(--radius-md);
      text-decoration: none; font-weight: 700;
      transition: var(--transition);
      box-shadow: 0 4px 14px rgba(26,122,82,.25);
    }
    .invalid-state a:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(26,122,82,.35);
    }

    .back-link { text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--neutral-500); }
    .back-link a { color: var(--green-600); font-weight: 700; text-decoration: none; transition: var(--transition-fast); }
    .back-link a:hover { color: var(--green-700); text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="lang-switch">
      <button class="lang-btn" id="lb-en" onclick="setLang('en')">English</button>
      <button class="lang-btn" id="lb-hi" onclick="setLang('hi')">हिंदी</button>
    </div>

    <div id="invalidState" class="invalid-state">
      <span class="icon">🔗</span>
      <h2 data-i18n="invalid_expired_link_title">Invalid or Expired Link</h2>
      <p data-i18n="invalid_expired_link_body_html">This password reset link is invalid or has expired.<br>Reset links are valid for only <strong>15 minutes</strong>.</p>
      <a href="forgot-password.html" data-i18n="request_new_link_btn">Request a New Link</a>
    </div>

    <div id="mainForm">
      <div class="brand">
        <span class="icon">🔒</span>
        <h1 data-i18n="set_new_password_title">Set New Password</h1>
        <p id="resetForEmail" style="color:#1a6b3a;font-weight:600;font-size:.9rem;"></p>
      </div>

      <div class="alert alert-error"   id="alertError"></div>
      <div class="alert alert-success" id="alertSuccess"></div>

      <div class="field">
        <label>🔒 <span data-i18n="new_password_lbl">New Password</span></label>
        <div class="pw-wrap">
          <input type="password" id="newPassword" data-i18n-ph="create_strong_pw_ph" placeholder="Create a strong password" autocomplete="new-password" oninput="checkStrength(this.value)" />
          <button class="eye-btn" type="button" onclick="togglePw('newPassword', this)">👁️</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-text" id="strengthText"></div>
      </div>

      <div class="field">
        <label>🔒 <span data-i18n="confirm_new_password_lbl">Confirm New Password</span></label>
        <div class="pw-wrap">
          <input type="password" id="confirmPassword" data-i18n-ph="repeat_pw_ph" placeholder="Repeat your password" autocomplete="new-password" />
          <button class="eye-btn" type="button" onclick="togglePw('confirmPassword', this)">👁️</button>
        </div>
      </div>

      <div class="rules" id="rulesBox">
        <strong data-i18n="pw_rules_title">Password must:</strong>
        <ul>
          <li id="r1" data-i18n="pw_rule_chars">Be at least 6 characters</li>
          <li id="r2" data-i18n="pw_rule_match">Match the confirmation field</li>
        </ul>
      </div>

      <button class="btn" id="resetBtn" onclick="doReset()">
        <span class="btn-label" data-i18n="reset_password_btn">✅ Reset Password</span>
        <div class="spinner"></div>
      </button>

      <div class="back-link">
        <a href="login.html" data-i18n="back_to_login">← Back to Login</a>
      </div>
    </div>

  </div>

  <script src="i18n.js"></script>
  <script>
    const curLang = localStorage.getItem('ks_lang') || 'en';
    document.getElementById('lb-' + curLang)?.classList.add('active');
    if (typeof Lang !== 'undefined') Lang.apply(curLang);

    function setLang(lang) {
      localStorage.setItem('ks_lang', lang);
      if (typeof Lang !== 'undefined') Lang.apply(lang);
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('lb-' + lang)?.classList.add('active');
      
      // Re-run dynamic text update on language change
      updateDynamicTexts();
    }

    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');
    const email  = params.get('email');

    function updateDynamicTexts() {
      if (!token || !email) {
        document.getElementById('mainForm').style.display    = 'none';
        document.getElementById('invalidState').style.display = 'block';
      } else {
        document.getElementById('resetForEmail').textContent = Lang.t('resetting_pw_for') + decodeURIComponent(email);
      }
      
      // Update rules display characters check
      const newPasswordVal = document.getElementById('newPassword').value;
      const r1 = document.getElementById('r1');
      if (r1) {
        r1.textContent = (newPasswordVal.length >= 6 ? '✓ ' : '') + Lang.t('pw_rule_chars');
      }
    }

    // Run dynamic texts on load
    updateDynamicTexts();

    function togglePw(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? '👁️' : '🙈';
    }

    function checkStrength(val) {
      let s = 0;
      if (val.length >= 6) s++;
      if (val.length >= 10) s++;
      if (/[A-Z]/.test(val)) s++;
      if (/[0-9]/.test(val)) s++;
      if (/[^A-Za-z0-9]/.test(val)) s++;
      const colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e', '#16a34a'];
      const labels = ['', Lang.t('weak'), Lang.t('fair'), Lang.t('good'), Lang.t('strong'), Lang.t('very_strong')];
      document.getElementById('strengthFill').style.cssText = `width:${s * 20}%;background:${colors[s] || 'transparent'}`;
      document.getElementById('strengthText').textContent = val.length ? labels[s] || '' : '';

      const r1 = document.getElementById('r1');
      r1.className = val.length >= 6 ? 'rule-ok' : '';
      r1.textContent = (val.length >= 6 ? '✓ ' : '') + Lang.t('pw_rule_chars');
    }

    function showAlert(type, msg) {
      document.getElementById('alertError').style.display   = 'none';
      document.getElementById('alertSuccess').style.display = 'none';
      const el = document.getElementById(type === 'error' ? 'alertError' : 'alertSuccess');
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function doReset() {
      const password = document.getElementById('newPassword').value;
      const confirm  = document.getElementById('confirmPassword').value;

      if (!password)           return showAlert('error', Lang.t('pw_required_alert'));
      if (password.length < 6) return showAlert('error', '❌ ' + Lang.t('pw_min_length'));
      if (password !== confirm) return showAlert('error', '❌ ' + Lang.t('pw_no_match'));

      const r2 = document.getElementById('r2');
      if (password !== confirm) {
        r2.className = '';
        return;
      }
      r2.className = 'rule-ok';

      const btn = document.getElementById('resetBtn');
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res  = await fetch('http://localhost:3000/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, email: decodeURIComponent(email), password }),
        });
        const data = await res.json();

        if (!data.success) {
          if (data.error.includes('invalid') || data.error.includes('expired')) {
            document.getElementById('mainForm').style.display    = 'none';
            document.getElementById('invalidState').style.display = 'block';
          } else {
            showAlert('error', '❌ ' + (Lang.t(data.error) || data.error));
          }
          return;
        }

        showAlert('success', Lang.t('pw_reset_success_alert'));
        document.getElementById('resetBtn').disabled = true;
        document.getElementById('rulesBox').style.display = 'none';
        setTimeout(() => window.location.href = 'login.html', 2000);
      } catch (err) {
        showAlert('error', Lang.t('network_error_alert'));
      } finally {
        btn.classList.remove('loading');
        if (!btn.disabled) btn.disabled = false;
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
  </script>
</body>
</html>
